<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            background-color: lightgray;
            width: 380px;
            height: 320px;
            text-align: center;
            border: 1px solid black;
        }
        h2{
            color:green;
            background-color: aliceblue;
        }
        p{
            color:yellow;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <form class="container">
        <!-- Design a contact us form with all fields as required. -->
        <h2>Contact Us</h2>
        <p>Do you have any questions? Please reach out to us</p>
        <input type="text" name="" id="" placeholder="Your Name" required><br><br>
        <input type="email" name="" id="" placeholder="Your EmailId" required><br><br>
        <input type="text" name="" id="" placeholder="Subject" required><br><br>
        <textarea name="" id="" placeholder="Your Message"></textarea><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
