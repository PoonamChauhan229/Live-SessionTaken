<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div{       
        color:orangered;
        position: relative;
        top:100px;
        left:50px;
        height:400px;
        width:400px;
        text-align: center;       
        border:1px solid red;
        background-color: red;
        border-radius: 10%;
        border:5px dotted navy;
    }
    button{
       /* adjusting/shifiting >> moving wrt parent */
        position: absolute;
        top:125px;
        left:90px;     
        border:10px groove red;
        background-color: rgb(255, 235, 192);
        padding:50px;
        border-radius: 10%;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        text-decoration: underline;
        text-transform: uppercase;
        color: blue;
        box-shadow: 100px;
        font-style: italic;
        font-family: 'Courier New', Courier, monospace;

    }
</style>
<body>
    <div>  
        <button>absolute</button>
    </div>
</body>
</html>
