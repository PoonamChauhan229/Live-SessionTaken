<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    .container {
      /* border: 3px solid red; */
      width: fit-content;
      display: grid;
      grid-template-columns: 553px 80px 80px 553px;
      grid-template-rows: 35px 300px 200px 35px;
      text-align: center;
    }
    .subItems {
      /* border: 2px solid black; */
      background-color: darkgoldenrod;
    }
    .sub1 {
      grid-column: 2/3;
      grid-row: 1/2;
      margin: 2px;
    }
    .sub2 {
      grid-column: 3/4;
      grid-row: 1/2;
      margin: 2px;
    }
    .sub3 {
      grid-column: 1/5;
      grid-row: 2/3;
    }
    .sub4 {
      grid-column: 1/3;
      grid-row: 3/4;
      background-color: aquamarine;
    }
    .sub5 {
      grid-column: 3/5;
      grid-row: 3/4;
      background-color: chartreuse;
    }
    .sub6 {
      grid-column: 1/5;
      grid-row: 4/5;
      background-color: cornflowerblue;
    }
  </style>
  <body>
    <div class="container">
      <div class="subItems sub1">Home</div>
      <div class="subItems sub2">About</div>
      <div class="subItems sub3">
        <img src="https://images.rawpixel.com/image_png_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvam9iNjgwLTE2Ni1wLWwxZGJ1cTN2LnBuZw.png" alt="" height="299" width="1266">
      </div>
      <div class="subItems sub4">Products</div>
      <div class="subItems sub5">Services</div>
      <div class="subItems sub6">Footer</div>
    </div>
  </body>
</html>
