<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>    
</head>
<!-- internal css -->
<style>
    div{
        /* property:value */
        font-size: 100px;
        border:20px solid orange;
        /* TRBL */
        border-radius: 15% 20% 30% 40% ;
        width:330px;
        padding: 15px 20px 30px 40px;
        margin:5px;
        background-color: cadetblue;
        opacity: 0.3;   /* 0-1 */
    }

    #test1{
        background-color: blue;
        color: white;
        font-weight: bold;
        padding: 10px;
        width:30.5%;
        text-align:center;
        font-size: 20px;
    }
    #test2{
        background-color: blue;
        color: white;
        font-weight: bold;
        padding: 10px;
        width:30.5%;
        text-align:center;
        font-size: 20px;
    }

    .commontest{
        background-color: burlywood;
        margin:0;
        /* height: 100px; */
        width:32%;
        font-weight: bold;
        font-size: 20px;
        text-align: center;
        /* inline || block || inline-block */
        /* behave like inline(side -side) but it will block property (h & w) */
        display: inline-block;
    }
</style>
<body>
    <!-- structure -->
    <div>HTML1</div>
    <div>HTML2</div>

    <p id="test1">Hello</p>
    <p id =test2>Hello</p>

    <h6 class="commontest">Welcome</h6>
    <p class="commontest">Welcome</p>
    <h4 class="commontest">Welcome</h4>

  
</body>
</html>
<!-- 
select
    id      >> #   >>attributes   >> unique
    class   >> .   >>attributes   >> multiple
    tag     >> tagname

-->

<!-- BOX MODEL
border >> thick line defines the outline
margin >> space outside the border
padding >> space inside the border

each element >> has box model>> tagname+content


-->
