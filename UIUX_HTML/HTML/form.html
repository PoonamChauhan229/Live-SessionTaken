<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <!-- input tags >> self closing tags >> inline elements 
        placeholder
        label tag 
        -->
         <input type="text" name="userName" id="" placeholder="Enter Name"> <br><br>

         <label for="userEmail">Email:</label>
         <input type="email" name="userEmail" id="userEmail"> <br><br>

         <label for="userAdd"></label>
         <input type="text" name="userAddress" id="userAdd" placeholder="Enter address"> <br><br>

         <!-- radio button  -only 1  name ="" grouping   name=value-->

        <input type="radio" name="gender" id="userMale" value="male">
        <label for="userMale">Male</label>

        <input type="radio" name="gender" id="userFemale" value="Female">
        <label for="userFemale">Female</label>
         
         
         <br><br>
         <input type="submit" value="Submit">
         <input type="reset" value="Reset">
    </form>
</body>
</html>
